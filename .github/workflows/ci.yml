name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # ✅ ручной запуск
  schedule:
    - cron: "0 3 * * *" # ✅ ежедневный запуск (03:00 UTC → 06:00 Minsk)

# -------------------------------
# ✅ Reusable steps (YAML anchors)
# -------------------------------

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    # 👇 Общие шаги вынесены в anchor &e2e-steps
    steps: &e2e-steps
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -------------------------------
      # ✅ Backend deps
      # -------------------------------
      - name: Install backend deps
        working-directory: ${{ github.workspace }}
        run: |
          npm install
          npm rebuild sqlite3 --build-from-source

      # -------------------------------
      # ✅ Frontend deps
      # -------------------------------
      - name: Install frontend deps
        working-directory: ${{ github.workspace }}/web
        run: npm install --force

      # -------------------------------
      # ✅ Playwright browsers (LOCAL)
      # -------------------------------
      - name: Install Playwright browsers
        working-directory: ${{ github.workspace }}
        run: |
          node ./node_modules/playwright-core/cli.js install-deps
          node ./node_modules/playwright-core/cli.js install chromium

      # -------------------------------
      # ✅ Start backend
      # -------------------------------
      - name: Start backend
        working-directory: ${{ github.workspace }}
        run: |
          nohup npm start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        working-directory: ${{ github.workspace }}
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:3000/health | grep -q '"ok"'; then
              echo "Backend OK"
              exit 0
            elif curl -s http://localhost:3000 >/dev/null 2>&1; then
              echo "Backend responding (no health endpoint)"
              exit 0
            fi
            echo "Waiting backend ($i/40)..."
            sleep 1
          done
          echo "Backend failed"
          cat backend.log || true
          exit 1

      - name: Print backend log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          echo "===== BACKEND LOG ====="
          cat backend.log || true

      # -------------------------------
      # ✅ Start frontend
      # -------------------------------
      - name: Start frontend
        working-directory: ${{ github.workspace }}/web
        run: |
          nohup npm run dev > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for frontend
        working-directory: ${{ github.workspace }}
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:5173 | grep -q "<"; then
              echo "Frontend OK"
              exit 0
            fi
            echo "Waiting frontend ($i/40)..."
            sleep 1
          done
          exit 1

      # -------------------------------
      # ✅ Run Playwright Tests
      # -------------------------------
      - name: Run E2E tests
        working-directory: ${{ github.workspace }}
        run: |
          echo "Running E2E tests in $(pwd)"
          node ./node_modules/@playwright/test/cli.js test \
            --config=playwright.config.cjs \
            --project=chromium-headless

      # -------------------------------
      # ✅ Upload reports/artifacts
      # -------------------------------
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

      # -------------------------------
      # ✅ Cleanup
      # -------------------------------
      - name: Cleanup
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          kill $(cat backend.pid) || true
          kill $(cat frontend.pid) || true

  # -------------------------------
  # ✅ DAILY JOB (schedule)
  # -------------------------------
  daily-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps: *e2e-steps # ← переиспользуем шаги

  # -------------------------------
  # ✅ MANUAL JOB (workflow_dispatch)
  # -------------------------------
  manual-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps: *e2e-steps # ← переиспользуем шаги
