name: CI

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug workspace structure
        run: |
          echo "workspace dir = ${{ github.workspace }}"
          ls -al ${{ github.workspace }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ✅ Backend deps

      - name: Install backend deps
        working-directory: ${{ github.workspace }}
        run: |
          npm install
          npm rebuild sqlite3 --build-from-source

      # ✅ Frontend deps
      - name: Install frontend deps
        working-directory: ${{ github.workspace }}/web
        run: npm install --force

      - name: Install Playwright browsers
        working-directory: ${{ github.workspace }}
        run: |
          npm install -g playwright
          playwright install --with-deps

      # ✅ Start backend

      - name: Start backend
        working-directory: ${{ github.workspace }}
        run: |
          nohup npm start > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        working-directory: ${{ github.workspace }}
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:3000/health 2>/dev/null | grep -q '"ok"'; then
              echo "Backend OK"
              exit 0
            elif curl -s http://localhost:3000 2>/dev/null; then
              echo "Backend responding (port OK)"
              exit 0
            fi
            echo "Waiting backend... (attempt $i/40)"
            sleep 1
          done
          echo "Backend failed to start"
          cat backend.log || true
          exit 1

      - name: Print backend log on failure
        if: failure()
        working-directory: ${{ github.workspace }}
        run: |
          echo "===== BACKEND LOG ====="
          cat backend.log || true

      # ✅ Start frontend
      - name: Start frontend
        working-directory: ${{ github.workspace }}/web
        run: |
          nohup npm run dev > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for frontend
        working-directory: ${{ github.workspace }}
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:5173 | grep -q "<"; then
              echo "Frontend OK"
              exit 0
            fi
            echo "Waiting frontend..."
            sleep 1
          done
          exit 1

      - name: Debug tests-e2e contents
        working-directory: ${{ github.workspace }}
        run: |
          echo "--- tests-e2e directory contents ---"
          ls -al tests-e2e

      - name: Debug test file info
        working-directory: ${{ github.workspace }}
        run: |
          echo "--- FULL PATH of test file ---"
          find . -name "auth-and-crud.spec.cjs" -print0 | xargs -0 ls -l

      - name: Run E2E tests
        working-directory: ${{ github.workspace }}
        run: |
          echo "Running E2E tests in $(pwd)"
          npx playwright test --config=playwright.config.cjs --project=chromium-headless

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Cleanup
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          kill $(cat backend.pid) || true
          kill $(cat frontend.pid) || true
